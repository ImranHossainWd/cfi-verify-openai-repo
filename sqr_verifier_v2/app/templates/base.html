<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_name }}</title>
  <link rel="stylesheet" href="/static/app.css?v=20260520-openai-ui">
  <style>
    body { margin: 0; background: #f6f8fb; color: #152033; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 24px; padding: 18px 32px; background: #fff; border-bottom: 1px solid #dce3ec; }
    .brand { display: flex; align-items: center; gap: 14px; color: inherit; text-decoration: none; }
    .brand span { display: grid; gap: 2px; }
    .brand small { color: #607086; }
    .logo { width: 46px; height: 46px; max-width: 46px; max-height: 46px; object-fit: contain; }
    nav { display: flex; gap: 18px; color: #607086; font-weight: 650; }
    nav a { color: inherit; text-decoration: none; }
    main { max-width: 1240px; margin: 0 auto; padding: 32px; }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">
      <img src="/static/logo.svg" alt="" class="logo">
      <span>
        <strong>California Fruit</strong>
        <small>OpenAI Sorting Quality Verifier</small>
      </span>
    </a>
    <nav>
      <a href="/">Packets</a>
      <a href="/healthz">Health</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
