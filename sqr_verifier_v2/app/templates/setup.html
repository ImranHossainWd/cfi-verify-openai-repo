{% extends "base.html" %}
{% block content %}
<section class="auth-shell">
  <div class="panel auth-card">
    <p class="eyebrow">First-time setup</p>
    <h1>Create admin user</h1>
    <p class="hint">This page is available only while no users exist.</p>
    {% if error %}<p class="notice error">{{ error }}</p>{% endif %}
    <form method="post" action="/setup" class="auth-form">
      <label>Name
        <input type="text" name="name" autocomplete="name" placeholder="Admin">
      </label>
      <label>Email
        <input type="email" name="email" autocomplete="email" required>
      </label>
      <label>Password
        <input type="password" name="password" autocomplete="new-password" minlength="8" required>
      </label>
      <button type="submit">Create admin</button>
    </form>
  </div>
</section>
{% endblock %}
