{% extends "base.html" %}
{% block content %}
<section class="panel">
  <div class="panel-head">
    <div>
      <p class="eyebrow">Admin</p>
      <h1>Users</h1>
    </div>
  </div>
  <form method="post" action="/users" class="user-create-form">
    <label>Name
      <input type="text" name="name" placeholder="Reviewer name">
    </label>
    <label>Email
      <input type="email" name="email" required>
    </label>
    <label>Role
      <select name="role">
        <option value="Reviewer">Reviewer</option>
        <option value="Viewer">Viewer</option>
        <option value="Admin">Admin</option>
      </select>
    </label>
    <label>Password
      <input type="password" name="password" minlength="8" required>
    </label>
    <button type="submit">Add user</button>
  </form>
</section>

<section class="panel user-list-panel">
  <h2>Current users</h2>
  <div class="user-list">
    {% for user in users %}
    <form method="post" action="/users/update" class="user-row">
      <input type="hidden" name="email" value="{{ user.email }}">
      <div>
        <strong>{{ user.email }}</strong>
        <small>{{ user.created_at }}</small>
      </div>
      <label>Name
        <input type="text" name="name" value="{{ user.name }}">
      </label>
      <label>Role
        <select name="role">
          {% for role in roles %}
          <option value="{{ role }}" {% if user.role == role %}selected{% endif %}>{{ role }}</option>
          {% endfor %}
        </select>
      </label>
      <label>Status
        <select name="active">
          <option value="true" {% if user.active %}selected{% endif %}>Active</option>
          <option value="false" {% if not user.active %}selected{% endif %}>Disabled</option>
        </select>
      </label>
      <label>New password
        <input type="password" name="password" minlength="8" placeholder="Leave unchanged">
      </label>
      <button type="submit" class="small">Save</button>
    </form>
    {% endfor %}
  </div>
</section>
{% endblock %}
