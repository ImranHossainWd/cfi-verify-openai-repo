# Product code → display-name mapping
# When a Sage product code shows up (e.g. "PEACHES-DICED-SINGLE"), map it here
# so the customer-product pair can be looked up in the specs table.
product_aliases:
  "PEACHES-DICED-SINGLE":  "Single Diced Peaches"
  "PEACHES-DICED-DOUBLE":  "Double Diced Peaches"
  "PEACHES-RAW-66":        "Peaches Raw 66"
  "PEACHES-RAW-84":        "Peaches Raw 84"
  "PEACHES-RAW-JUMBO":     "Jumbo Peaches"
  "PEACHES-RAW-XJUMBO":    "Jumbo Peaches"
  # Pedrick product codes
  "COTS-EXTRA-RIPE":       "Extra Ripe Apricots"
  "GOTS-EXTRA-RIPE":       "Extra Ripe Apricots"           # OCR alias
  "APRICOTS-SLAB":         "Apricot Slabs"
