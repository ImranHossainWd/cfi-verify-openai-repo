# California Fruit Inc — Customer Registry
# Each entry maps a customer's name (as it appears on documents, in any form)
# to a canonical name + customer-specific behavior flags.
#
# To add a new customer: copy a block, edit the aliases and canonical name,
# adjust the flags. No code changes required.

customers:
  - canonical: "Olive Nation"
    aliases:
      - "Olive Nation"
      - "OliveNation"
      - "Olive Nation LLC"
    customer_code: "BPC-000130"
    co_packer_route: false       # Has direct shipment (BOL + Trailer/Cargo required)
    requires_bol: true
    requires_trailer_inspection: true
    notes: "Direct ship via FedEx parcel."

