services:
  - type: web
    name: california-fruit-openai-verifier
    env: docker
    plan: standard
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    disk:
      name: sqr-verifier-data
      mountPath: /var/data/sqr-verifier
      sizeGB: 10
    envVars:
      - key: VISION_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_REASONING_EFFORT
        value: none
      - key: FULL_PACKET_FIELD_DISCOVERY
        value: "true"
      - key: MAX_UPLOAD_MB
        value: "150"
      - key: SQR_DATA_DIR
        value: /var/data/sqr-verifier
      - key: SQR_CONFIG_DIR
        value: /var/data/sqr-verifier/config
