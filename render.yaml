services:
  - type: web
    name: california-fruit-sq-verifier
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    envVars:
      - key: VISION_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_REASONING_EFFORT
        value: none
      - key: MAX_UPLOAD_MB
        value: "150"
      - key: SQR_DATA_DIR
        value: /tmp/sqr-verifier
